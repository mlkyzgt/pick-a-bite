spring.application.name=pick-a-bite

# PostgreSQL veritabani baglantisi
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Sunucu
server.port=8080

# JWT ayarlari
# Uretimde mutlaka environment degiskeni ile override edin.
jwt.secret=lutfen-bu-anahtari-uretimde-degistirin-en-az-32-bayt-olmali!!
jwt.expirationMs=86400000

# Jackson
spring.jackson.default-property-inclusion=non_null

# Groq / Spring AI (OpenAI-uyumlu istemci — GROQ_API_KEY zorunlu)
# Anahtar: https://console.groq.com/keys
# Boş bırakılırsa uygulama yine açılır; AI uçları GROQ_API_KEY olmadan 503 döner
spring.ai.openai.api-key=kendi_api_keyiniz
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.3

# Menü import (backend/menu/menu.json)
pickabite.menu.import.path=../menu/menu.json
pickabite.menu.sync.cron=0 0 3 * * *

# Demo restoranlar — Bursa Mimar Sinan (uygulama açılışında, kayıt yoksa ekler)
pickabite.demo.seed.enabled=true
pickabite.demo.seed.path=classpath:seed/bursa-mimar-sinan.json
