spring.application.name=pick-a-bite

# ============================================================
# DATABASE — H2 (PostgreSQL uyumlu mod, dosyaya kaydeder)
# ============================================================
# Demo için PostgreSQL kurulumu yerine H2 kullaniyoruz.
# MODE=PostgreSQL ile aynı SQL dilini konuşur, code değişmiyor.
# Veriler ./data/pickabite-h2.mv.db içinde kalıcı.
spring.datasource.url=jdbc:h2:file:./data/pickabite-h2;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 console (browser'da DB içeriği — opsiyonel)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================
# Sunucu
# ============================================================
server.port=8080
# Tüm network interface'lerinden dinle — telefon LAN'dan ulaşabilsin
server.address=0.0.0.0

# ============================================================
# JWT ayarlari
# ============================================================
jwt.secret=lutfen-bu-anahtari-uretimde-degistirin-en-az-32-bayt-olmali!!
jwt.expirationMs=86400000

# ============================================================
# Jackson
# ============================================================
spring.jackson.default-property-inclusion=non_null

# ============================================================
# UTF-8 zorla (Türkçe karakterler için kritik)
# ============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8

# ============================================================
# Otomatik menü senkronizasyonu (Gereksinim md.9)
# Kaynak dosya belirli aralıklarla okunur; fiyat/ürün değişiklikleri
# veritabanına otomatik yansıtılır. Kaynak yolu backend çalışma
# dizinine görelidir (mvnw'nin çalıştığı klasör).
# ============================================================
app.menu.senkron.kaynak=./menu-kaynak.json
app.menu.senkron.aralik-ms=60000
app.menu.senkron.baslangic-ms=15000
# URL kaynaklari (QR kesfi / toplayici ile baglanan GERCEK web siteleri)
# dis sitelere nazik davranmak icin saatte bir taranir
app.menu.senkron.url-aralik-ms=3600000

# QR kesif: kullanicinin okuttugu web menu adresinden menuyu cikarip kalici
# kaydeder. yerel-izin=true demo icindir (yerel test sitesine erisim);
# URETIMDE false yapilmali (SSRF korumasi: ic ag adresleri engellenir).
app.qr-kesif.yerel-izin=true

# ============================================================
# Otomatik AI menu zenginlestirme (Gereksinim md.5)
# Eksik bilgili (aciklama/kalori/alerjen) ya da adi bozuk urunleri
# Groq ile periyodik doldurur — yeni kesfedilen restoran kendiliginden
# tamamlanir. Anahtar: once GROQ_API_KEY env, yoksa frontend .env.
# ============================================================
app.zenginlestir.aktif=true
app.zenginlestir.aralik-ms=120000
app.zenginlestir.baslangic-ms=30000
app.zenginlestir.grup-boyu=15
app.zenginlestir.max-grup-tur-basina=2
app.zenginlestir.model=llama-3.3-70b-versatile
app.groq.api-key=${GROQ_API_KEY:}
app.groq.env-yolu=../pick-a-bite-main/.env

# Zamanlanmis isler (senkron + zenginlestirme) paralel kossun
spring.task.scheduling.pool.size=2
